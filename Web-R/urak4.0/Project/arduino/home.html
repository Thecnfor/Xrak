<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="renderer" content="webkit">
    <link rel="stylesheet" type="text/css" href="back_index/main.css">
</head>
<body>
    <div class="container_content">
        <h1>Arduino 控制台</h1>
        <p>欢迎使用 Arduino 控制台，你可以通过此控制台来控制你的 Arduino 板子。</p>
    </div>
    <div class="container_status">
        <h2>Arduino 状态</h2>
        <div class="container_status_item">
            <h3></h3>
            <p id="status"></p>
        </div>
        <div class="container_control_response">
            <h3>输出反应</h3>
            <div id="response"></div>
            <div id="response_joystick"></div>
        </div>
    </div>
    <div class="container_control_container">
        <div class="container_control">
            <div class="container_control_buttons">
                <button onclick="sendCommand('turnOn')" class="button_control">Turn On</button>  
                <button onclick="sendCommand('turnOff')" class="button_control">Turn Off</button> 
            </div>
            <div class="container_control_joystick">
                <iframe src="joystick/index.html" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
            </div>
            <script>  
                function sendCommand(action) {  
                    var url = "home.php?action=" + action;  
                    var xhr = new XMLHttpRequest();  
                    xhr.open("GET", url, true);  
                    xhr.onreadystatechange = function () {  
                        if (xhr.readyState == 4 && xhr.status == 200) {  
                            document.getElementById("response").innerHTML = "Response: " + xhr.responseText;  
                        }  
                    };  
                    xhr.send();  
                }  
            </script>
            <script>  
                // 假设你有一个名为 'sendJoystickData' 的函数，它发送 AJAX 请求到 PHP 脚本  
                function sendJoystickData(x, y) {  
                    // 使用 Fetch API, jQuery.ajax, 或 XMLHttpRequest 发送请求  
                    // 这里使用 Fetch API 作为例子  
                    fetch('home.php', {  
                        method: 'POST',  
                        headers: {  
                            'Content-Type': 'application/json'  
                        },  
                        body: JSON.stringify({ x: x, y: y })  
                    })  
                    .then(response => response.json())  
                    .then(data => {  
                        var responseDiv = document.getElementById('response_joystick');  
                        if (data.status === 'success') {  
                            responseDiv.innerHTML = '成功发送命令X: ' + data.message.split(': ')[1].split(', ')[0] + '，Y: ' + data.message.split(', ')[1].split(' ')[0] + '，ESP8266响应: ' + data.message.split(', ')[2];  
                        } else {  
                            responseDiv.innerHTML = data.message;  
                        }  
                    })  
                    .catch(error => {  
                        console.error('Error:', error);  
                        // 显示错误到 div 或其他元素中  
                        responseDiv.innerHTML = error.message;  
                    });  
                }  
                  
                // 你可以通过调用 sendJoystickData 函数并传递 x 和 y 值来触发 AJAX 请求  
                // 例如：sendJoystickData(10, 20);  
            </script>
        </div>
    </div>
</html>
